<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Hridyang Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=11.0">
    <link rel="manifest" href="manifest.json">
</head>

<body style="background: var(--bg-light);">
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">Hridyang</a>
            <div class="nav-icons">
                <a href="#" class="install-app-btn install-app-prompt" style="display: none; background: #1E3A8A; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 500; margin-right: 15px; text-decoration: none;"><i class="fas fa-download" style="margin-right: 5px;"></i> Install App</a>
            </div>
        </div>
    </nav>

    <div class="section">
        <div class="checkout-container">
            <div class="checkout-form">
                <div class="checkout-section">
                    <h3>Contact Information</h3>
                    <input type="email" id="chkEmail" placeholder="Email Address" required style="width: 100%; padding: 15px; border: 1px solid var(--border); margin-bottom: 20px;">
                    <input type="tel" id="chkPhone" placeholder="Phone Number" required style="width: 100%; padding: 15px; border: 1px solid var(--border);">
                </div>

                <div class="checkout-section">
                    <h3>Shipping Address</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <input type="text" id="chkFirstName" placeholder="First Name" required style="padding: 15px; border: 1px solid var(--border);">
                        <input type="text" id="chkLastName" placeholder="Last Name" required style="padding: 15px; border: 1px solid var(--border);">
                    </div>
                    <input type="text" id="chkAddress" placeholder="Address" required style="width: 100%; padding: 15px; border: 1px solid var(--border); margin-bottom: 20px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <input type="text" id="chkCity" placeholder="City" required style="padding: 15px; border: 1px solid var(--border);">
                        <input type="text" id="chkPin" placeholder="PIN Code" required style="padding: 15px; border: 1px solid var(--border);">
                    </div>
                </div>

                <button id="placeOrderBtn" class="btn primary" style="width: 100%; padding: 25px;">Place Order</button>
            </div>

            <div class="checkout-summary">
                <div class="checkout-section">
                    <h3>Order Summary</h3>
                    <div id="checkoutItemsContainer"></div>
                    <div style="border-top: 1px solid var(--border); padding-top: 20px; margin-top: 20px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <span>Subtotal</span>
                            <span id="checkoutSubtotal">₹0</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <span>Shipping</span>
                            <span id="checkoutShipping">Free</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; font-weight: 600; font-size: 1.2rem; margin-top: 20px; color: var(--primary);">
                            <span>Total</span>
                            <span id="checkoutTotal">₹0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script-v12.js"></script>
</body>

</html>
