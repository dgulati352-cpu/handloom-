    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <picture>
                    <source srcset="assets/logo-dark.png" media="(prefers-color-scheme: dark)">
                    <img src="assets/logo.png" alt="Hridyang Logo" style="height: 50px; width: auto;">
                </picture>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="handloom.html">Handloom</a></li>

            </ul>

                <a href="#" id="searchIcon"><i class="fas fa-search"></i></a>
                <a href="#" id="cartIcon"><i class="fas fa-shopping-bag"></i><span id="cartBadge">0</span></a>

    <main class="section">
        <div id="pdp-content">

        </div>

    <section class="section install-app-section" style="display: none; background: var(--bg-surface); padding: 60px 40px; text-align: center; border-top: 1px solid var(--border); margin-top: 40px;">
        <div style="max-width: 600px; margin: 0 auto;">
            <p style="text-transform: uppercase; letter-spacing: 2px; color: var(--primary); margin-bottom: 15px; font-weight: 600;">Enhanced Experience</p>

            <p style="color: var(--text-muted); margin-bottom: 30px;">For a faster, more seamless shopping experience, install the Hridyang Collection app on your device.</p>
            <button class="btn primary install-app-btn"><i class="fas fa-download" style="margin-right: 10px;"></i> Install Now</button>
        </div>
    </section>

    <!-- Shared Cart/Search -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header"><h2>Your Bag</h2><span id="closeCart">&times;</span></div>
        <div class="cart-items" id="cartItemsContainer"></div>
        <div class="cart-footer">
            <div class="cart-total"><span>Total</span><span id="cartTotalValue">₹0</span></div>
            <button id="checkoutBtn" class="btn primary">Checkout</button>
        </div>
