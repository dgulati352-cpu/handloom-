<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Hridyang Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #1E3A8A;
            --primary-light: #f0f9ff;
            --text-dark: #1A1A1A;
            --text-muted: #666;
            --success: #38a169;
            --warning: #d69e2e;
            --danger: #e53e3e;
            --bg-glass: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #f4f7f6;
            color: var(--text-dark);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        aside {
            width: 260px;
            height: 100vh;
            background: #1A1A1A;
            color: white;
            padding: 30px 0;
            position: fixed;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 50px;
            letter-spacing: 4px;
            color: white;
            text-decoration: none;
            display: block;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            padding: 15px 30px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 300;
            letter-spacing: 1px;
            color: #aaa;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.05);
            color: white;
            border-left: 4px solid var(--primary);
        }

        /* Main Content */
        main {
            margin-left: 260px;
            flex-grow: 1;
            padding: 40px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card i {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .stat-val {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Table Section */
        .content-section {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid #f0f0f0;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        td {
            padding: 18px 15px;
            border-bottom: 1px solid #f9f9f9;
            font-size: 0.95rem;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-pending { background: #fff5f5; color: var(--danger); }
        .status-shipped { background: #f0fff4; color: var(--success); }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1e3a8a; filter: brightness(1.2); }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .modal-content h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 30px;
        }

        #apiStatus {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--success);
        }
    </style>
</head>
<body>
    <aside>
        <a href="index.html" class="logo">HRIDYANG</a>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="switchSection('orders')">
                <i class="fas fa-shopping-bag"></i> Orders
            </li>
            <li class="nav-item" onclick="switchSection('promos')">
                <i class="fas fa-tag"></i> Promo Codes
            </li>
            <li class="nav-item" onclick="switchSection('settings')">
                <i class="fas fa-cog"></i> Site Settings
            </li>
        </ul>
    </aside>

    <main>
        <header>
            <h1>Admin Dashboard</h1>
            <div id="apiStatus">
                <i class="fas fa-circle"></i> Checking status...
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-shopping-cart"></i>
                <div class="stat-val" id="statOrders">0</div>
                <div class="stat-label">Total Orders</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-rupee-sign"></i>
                <div class="stat-val" id="statRevenue">₹0</div>
                <div class="stat-label">Total Revenue</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-ticket-alt"></i>
                <div class="stat-val" id="statPromos">0</div>
                <div class="stat-label">Active Promos</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <div class="stat-val">1</div>
                <div class="stat-label">Admin Active</div>
            </div>
        </div>

        <!-- Orders Section -->
        <section id="ordersSection" class="content-section active">
            <div class="section-header">
                <h2>Manage Orders</h2>
            </div>
            <table id="ordersTable">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Items</th>
                        <th>Total</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Loaded via dashboard.js -->
                </tbody>
            </table>
        </section>

        <!-- Promos Section -->
        <section id="promosSection" class="content-section">
            <div class="section-header">
                <h2>Promo Codes</h2>
                <button class="btn btn-primary" onclick="openModal('promoModal')">
                    <i class="fas fa-plus"></i> New Promo
                </button>
            </div>
            <table id="promosTable">
                <thead>
                    <tr>
                        <th>Code</th>
                        <th>Discount</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Loaded via dashboard.js -->
                </tbody>
            </table>
        </section>

        <!-- Settings Section -->
        <section id="settingsSection" class="content-section">
            <div class="section-header">
                <h2>Site Settings</h2>
            </div>
            <div class="settings-form" style="max-width: 600px;">
                <div class="form-group">
                    <label>Store Name</label>
                    <input type="text" id="setStoreName" placeholder="Hridyang Collection">
                </div>
                <div class="form-group">
                    <label>Announcement Bar Text</label>
                    <textarea id="setAnnounceText" rows="2" placeholder="Welcome to Hridyang Collection..."></textarea>
                </div>
                <div class="form-group">
                    <label>Flat Shipping Cost (₹)</label>
                    <input type="number" id="setShippingCost" placeholder="199">
                </div>
                <div class="form-group">
                    <label>WhatsApp Number (with Country Code)</label>
                    <input type="text" id="setWhatsApp" placeholder="918791416116">
                </div>
                <button id="saveSettingsBtn" class="btn btn-primary">Save Changes</button>
            </div>
        </section>
    </main>

    <!-- Promo Modal -->
    <div id="promoModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="promoModalTitle">Create Promo Code</h3>
            <form id="promoForm">
                <div class="form-group">
                    <label>Promo Code</label>
                    <input type="text" id="promoCode" required style="text-transform: uppercase;">
                </div>
                <div class="form-group">
                    <label>Discount Percentage (%)</label>
                    <input type="number" id="promoDiscount" required min="1" max="100">
                </div>
                <div class="form-group">
                    <label>Min. Order Amount (₹)</label>
                    <input type="number" id="promoMinAmount" value="0">
                </div>
                <div class="form-group">
                    <label>Usage Limit</label>
                    <input type="number" id="promoLimit" value="9999">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn" onclick="closeModal('promoModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Promo</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
